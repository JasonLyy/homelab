# Metrics Server for `kubectl top`
# Talos/kubelet often uses serving certs that aren't trusted by metrics-server by default,
# so we enable insecure TLS to the kubelet.
args:
  - --kubelet-insecure-tls
  - --kubelet-preferred-address-types=InternalIP,Hostname,InternalDNS,ExternalIP

# Keep footprint small for homelab
resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
