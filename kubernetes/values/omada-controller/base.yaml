defaultPodOptions:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  nodeSelector:
    kubernetes.io/hostname: k3s-worker-1

controllers:
  main:
    containers:
      main:
        image:
          repository: mbentley/omada-controller
          tag: latest
          pullPolicy: IfNotPresent
        env:
          TZ: America/New_York
          MANAGE_HTTP_PORT: "8088"
          MANAGE_HTTPS_PORT: "8043"
          PORTAL_HTTP_PORT: "8088"
          PORTAL_HTTPS_PORT: "8843"
          SHOW_SERVER_LOGS: "true"
          SHOW_MONGODB_LOGS: "false"
          JAVA_TOOL_OPTIONS: "-Xmx768m"
        resources:
          requests:
            cpu: 400m
            memory: 1Gi
          limits:
            cpu: 4000m
            memory: 2Gi

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8088
      https:
        port: 8043
      portal-https:
        port: 8843
      eap-discovery:
        port: 29810
        protocol: UDP
      eap-discovery-v2:
        port: 19810
        protocol: UDP
      eap-manage:
        port: 29811
        protocol: TCP
      eap-adopt:
        port: 29812
        protocol: TCP
      eap-upgrade:
        port: 29813
        protocol: TCP
      eap-web:
        port: 29814
        protocol: TCP
      eap-manage-v2:
        port: 29815
        protocol: TCP
      eap-manage-v3:
        port: 29816
        protocol: TCP

ingress:
  main:
    enabled: true
    className: nginx
    hosts:
      - host: omada.local
        paths:
          - path: /
            service:
              identifier: main
              port: http

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 8Gi
    globalMounts:
      - path: /opt/tplink/EAPController/data
  logs:
    enabled: true
    type: persistentVolumeClaim
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 2Gi
    globalMounts:
      - path: /opt/tplink/EAPController/logs
