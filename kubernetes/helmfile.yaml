repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: tailscale
    url: https://pkgs.tailscale.com/helmcharts
  - name: bjw-s
    url: https://bjw-s-labs.github.io/helm-charts
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/

releases:
  - name: metrics-server
    namespace: kube-system
    chart: metrics-server/metrics-server
    wait: true
    timeout: 300
    values:
      - ./values/metrics-server/base.yaml

  - name: ingress-nginx
    namespace: ingress
    createNamespace: true
    chart: ingress-nginx/ingress-nginx
    wait: true
    timeout: 300
    values:
      - ./values/ingress-nginx/base.yaml
      - ./security.yaml

  - name: omada-controller
    namespace: omada
    createNamespace: true
    chart: bjw-s/app-template
    version: 3.2.1
    wait: true
    timeout: 600
    values:
      - ./values/omada-controller/base.yaml

  - name: grafana
    namespace: monitoring
    createNamespace: true
    chart: grafana/grafana
    values:
      - ./values/grafana/base.yaml
      - ./security.yaml

  - name: loki
    namespace: monitoring
    chart: grafana/loki
    wait: true
    timeout: 300
    cleanupOnFail: true
    values:
      - ./values/loki/base.yaml
      - ./security.yaml

  - name: alloy
    namespace: monitoring
    chart: grafana/alloy
    wait: true
    timeout: 300
    values:
      - ./values/alloy/base.yaml
      - ./security.yaml

  - name: kube-prometheus-stack
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    wait: true
    timeout: 600
    values:
      - ./values/kube-prometheus-stack/base.yaml

  - name: tailscale-operator
    namespace: tailscale
    createNamespace: true
    chart: tailscale/tailscale-operator
    version: 1.94.2
    wait: true
    timeout: 300
    values:
      - ./values/tailscale-operator/base.yaml
    # After install/upgrade, apply (or re-apply) the Connector CR to ensure exit node exists.
    hooks:
      # Ensure namespace allows privileged pods required for exit node functionality (sysctls & NET_ADMIN capabilities).
      - events: [preSync]
        command: kubectl
        showlogs: true
        args:
          - label
          - namespace
          - tailscale
          - pod-security.kubernetes.io/enforce=privileged
          - pod-security.kubernetes.io/audit=privileged
          - pod-security.kubernetes.io/warn=privileged
          - --overwrite
      - events: [postSync]
        showlogs: true
        command: kubectl
        args:
          - apply
          - -f
          - ./tailscale/connector-exitnode.yaml
